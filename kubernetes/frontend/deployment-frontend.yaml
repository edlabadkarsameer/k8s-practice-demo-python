apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: employee-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: edlabadkarsameer/k8s-practice-frontend:v4

        imagePullPolicy: Always

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"

          limits:
            cpu: "200m"
            memory: "128Mi"